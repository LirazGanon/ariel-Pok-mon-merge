name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pushing to the gh-pages branch lets GitHub auto-enable Pages on the first
# deploy, avoiding the manual "Source: GitHub Actions" toggle.
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Pokémon sprites
        run: npm run fetch-sprites

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

